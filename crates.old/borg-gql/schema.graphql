}

type ActorMessageConnection {
	edges: [ActorMessageEdge!]!
	pageInfo: PageInfo!
}

type ActorMessageEdge {
	cursor: String!
	node: ActorMessage!
}

enum ActorNotificationKind {
	ASSISTANT_REPLY
	TOOL_ACTIVITY
	ACTOR_EVENT
	MESSAGE
}

type ActorNotificationObject {
	id: String!
