type SubscriptionRoot {
	version: String!
	"""
	Streams new messages from an actor timeline as they are appended.
	"""
	actorChat(actorId: Uri!, afterMessageId: Uri, pollIntervalMs: Int): ActorMessage!
	"""
	Streams actor notifications derived from new timeline messages.
	"""
	actorNotifications(actorId: Uri!, afterMessageId: Uri, pollIntervalMs: Int, includeUserMessages: Boolean): ActorNotificationObject!
}

