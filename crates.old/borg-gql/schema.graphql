type QueryRoot {
	version: String!
	node(id: Uri!): Node
	actor(id: Uri!): Actor
	actors(first: Int, after: String): ActorConnection!
	port(name: String!): Port
	portById(id: Uri!): Port
	ports(first: Int, after: String): PortConnection!
	provider(provider: String!): Provider
	providers(first: Int, after: String): ProviderConnection!
	app(id: Uri!): App
	appBySlug(slug: String!): App
	apps(first: Int, after: String): AppListConnection!
	scheduleJob(jobId: String!): ScheduleJob
	scheduleJobs(first: Int, after: String, status: ScheduleJobStatusValue): ScheduleJobConnection!
	task(id: Uri!): Task
	tasks(first: Int, after: String): TaskConnection!
	memoryEntity(id: Uri!): MemoryEntity
	memoryEntities(queryText: String!, ns: String, kind: String, first: Int, after: String): MemoryEntityConnection!
	memoryFact(id: String!): MemoryFact
	memoryFacts(entityId: Uri, fieldId: Uri, includeRetracted: Boolean, first: Int, after: String): MemoryFactConnection!
}

