"""
Implement the DateTime<Utc> scalar

The input/output is a string in RFC3339 format.
"""
scalar DateTime

scalar JsonValue

type MemoryEntity implements Node {
	id: Uri!
	entityType: Uri!
	label: String!
	createdAt: DateTime!
	updatedAt: DateTime!
	props: [MemoryPropertyObject!]!
	facts(first: Int, after: String, fieldId: Uri, includeRetracted: Boolean): MemoryFactConnection!
}

type MemoryEntityConnection {
	edges: [MemoryEntityEdge!]!
	pageInfo: PageInfo!
}

type MemoryEntityEdge {
	cursor: String!
	node: MemoryEntity!
}

type MemoryFact {
	"""
	Fact URI.
	"""
	id: Uri!
	"""
	Source URI that asserted this fact.
	"""
	source: Uri!
	"""
	Entity URI that this fact targets.
	"""
	entity: Uri!
	"""
	Field URI for this fact.
	"""
	field: Uri!
	"""
	Fact field cardinality (`ONE` or `MANY`).
	"""
	arity: MemoryFactArity!
	"""
	Typed value projection for the fact payload.
	"""
	value: MemoryValueObject!
	"""
	Transaction URI that wrote this fact row.
	"""
	txId: Uri!
	"""
	Timestamp when the fact was stated.
	"""
	statedAt: DateTime!
	"""
	Whether the fact has been retracted.
	"""
	isRetracted: Boolean!
}

enum MemoryFactArity {
	ONE
	MANY
}

type MemoryFactConnection {
	edges: [MemoryFactEdge!]!
	pageInfo: PageInfo!
}

type MemoryFactEdge {
	cursor: String!
	node: MemoryFact!
}

type MemoryPropertyObject {
	key: String!
	value: MemoryValueObject!
}

enum MemoryValueKind {
	TEXT
	INTEGER
	FLOAT
	BOOLEAN
	BYTES
	REF
	DATE
	DATE_TIME
	LIST
}

type MemoryValueObject {
	kind: MemoryValueKind!
	text: String
	integer: Int
	float: Float
	boolean: Boolean
	bytesBase64: String
	reference: Uri
	date: String
	datetime: String
	list: [MemoryValueObject!]
}

type ModelObject {
	name: String!
}

type MutationRoot {
	version: String!
	upsertActor(input: UpsertActorInput!): Actor!
	deleteActor(id: Uri!): Boolean!
	deleteActorMessages(id: Uri!): Int!
	upsertPort(input: UpsertPortInput!): Port!
	upsertPortBinding(input: UpsertPortBindingInput!): PortBinding!
	upsertPortActorBinding(input: UpsertPortActorBindingInput!): PortActorBinding!
	upsertProvider(input: UpsertProviderInput!): Provider!
	deleteProvider(provider: String!): Boolean!
	upsertApp(input: UpsertAppInput!): App!
	upsertAppCapability(input: UpsertAppCapabilityInput!): AppCapability!
	upsertAppConnection(input: UpsertAppConnectionInput!): AppConnection!
	upsertAppSecret(input: UpsertAppSecretInput!): AppSecret!
	createScheduleJob(input: CreateScheduleJobInputGql!): ScheduleJob!
	updateScheduleJob(jobId: String!, patch: UpdateScheduleJobInputGql!): ScheduleJob!
	pauseScheduleJob(jobId: String!): Boolean!
	resumeScheduleJob(jobId: String!): Boolean!
	cancelScheduleJob(jobId: String!): Boolean!
	createTask(input: CreateTaskInputGql!): Task!
	updateTask(input: UpdateTaskInputGql!): Task!
	setTaskStatus(input: SetTaskStatusInput!): Task!
	runActorChat(input: RunActorChatInput!): RunActorChatResult!
	runPortHttp(input: RunPortHttpInput!): RunPortHttpResult!
}

interface Node {
	id: Uri!
}

type PageInfo {
	hasNextPage: Boolean!
	endCursor: String
}

