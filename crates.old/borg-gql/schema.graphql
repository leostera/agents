type Actor implements Node {
	id: Uri!
	name: String!
	systemPrompt: String!
	model: String
	status: ActorStatusValue!
	createdAt: DateTime!
	updatedAt: DateTime!
	messages(first: Int, after: String): ActorMessageConnection!
