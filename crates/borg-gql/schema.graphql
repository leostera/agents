	Example:
	```graphql
	query($entity: Uri!) {
	memoryFacts(entityId: $entity, first: 20) {
	edges { node { id field value { kind text reference } } }
	}
	}
	```
	"""
	memoryFacts(entityId: Uri, fieldId: Uri, includeRetracted: Boolean, first: Int, after: String): MemoryFactConnection!
