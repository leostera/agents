fragment ProviderFields on Provider {
  provider
  providerKind
  apiKey
  baseUrl
  enabled
  tokensUsed
  lastUsed
  defaultTextModel
  defaultAudioModel
  createdAt
  updatedAt
}

query ProvidersList($first: Int!, $after: String) {
  providers(first: $first, after: $after) {
    edges {
      node {
        ...ProviderFields
      }
    }
    pageInfo {
      endCursor
      hasNextPage
    }
  }
}

query ProviderByKey($provider: String!) {
  provider(provider: $provider) {
    ...ProviderFields
  }
}

mutation UpsertProvider($input: UpsertProviderInput!) {
  upsertProvider(input: $input) {
    ...ProviderFields
  }
}

mutation DeleteProvider($provider: String!) {
  deleteProvider(provider: $provider)
}
